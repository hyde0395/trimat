name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast feedback: native Rust tests + clippy on each OS/arch the kernels target.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --verbose
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # Cross-platform Python wheels via maturin. Covers the architectures named in
  # the project overview: Apple Silicon, ARM Linux, and x86.
  wheels:
    name: wheels (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: macos-14
            target: aarch64
          - runner: macos-13
            target: x86_64
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - name: Install and smoke-test wheel
        # Skip on Linux: the manylinux wheels are built in a container whose
        # interpreter need not match the host's, and Linux import/compute is
        # already covered natively by the dedicated python-tests job. macOS and
        # Windows build natively against the host Python, so smoke them here.
        if: ${{ matrix.platform.runner != 'ubuntu-latest' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install --no-index --find-links dist trimat
          # Run from a fresh empty dir so the *installed wheel* is imported, not
          # the local ./trimat source package (which has no compiled extension).
          mkdir -p _smoke && cd _smoke
          python -c "import numpy as np, trimat; t=trimat.pack(np.eye(8,dtype=np.float32)); x=np.arange(8,dtype=np.float32); assert np.allclose(trimat.gemv(t,x),x); assert np.allclose(trimat.qgemv(t,x),x,atol=0.1); print('smoke OK:', trimat.cpu_features())"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  # Full Python suite including the optional integrations (loader + BitLinear)
  # on a single platform with reliable CPU torch wheels, so those tests run in
  # CI rather than being skipped.
  python-tests:
    name: python tests (loader + BitLinear)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build extension in a venv and run Python tests
        # maturin develop requires an active virtualenv; create one so the built
        # extension lands in ./trimat and `import trimat` resolves locally.
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin numpy pytest safetensors
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          maturin develop --release --features extension-module
          python -m pytest tests/ -v
